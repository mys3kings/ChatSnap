<!DOCTYPE html>
<html>
<head>
  <title>Imperion</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#121212">

  <style>
    body { font-family: sans-serif; background: #121212; color: #e0e0e0; padding: 20px; }

    h2 { text-align: center; }

    #auth {
      background:#1e1e1e;
      padding:20px;
      border-radius:10px;
      max-width:350px;
      margin:auto;
      text-align:center;
    }

    input, button {
      width:100%;
      padding:10px;
      margin:5px 0;
      border:none;
      border-radius:5px;
    }

    input { background:#2c2c2c; color:white; }
    button { background:#3a3a3a; color:white; }

    #messages {
      height: 400px;
      overflow-y: scroll;
      padding: 10px;
      border-radius: 8px;
      background: #1e1e1e;
      margin-top:10px;
    }

    .msg {
      display:flex;
      align-items:flex-start;
      margin: 5px 0;
      padding: 8px;
      border-radius: 10px;
      max-width: 75%;
    }

    .mine { background:#3a3a3a; margin-left:auto; flex-direction:row-reverse; }
    .other { background:#2c2c2c; }

    .msg img {
      width:30px;
      height:30px;
      border-radius:50%;
      margin:5px;
    }

    .timestamp {
      font-size:10px;
      color:#888;
    }
  </style>
</head>

<body>

<div id="auth">
  <h2>SIGN INTO IMPERION</h2>

  <button id="googleLogin">Continue with Google</button>

  <input type="email" id="emailInput" placeholder="Email">
  <input type="password" id="passwordInput" placeholder="Password">
  <button id="emailLogin">Login / Signup</button>

  <input type="text" id="nicknameInput" placeholder="Choose username">
  <input type="file" id="profilePicInput" accept="image/*">
  <button id="setProfile">Save Profile</button>
</div>

<div id="chatUI" style="display:none;">
  <h2>Imperion</h2>
  <div id="messages"></div>

  <input type="text" id="input" placeholder="Type message">
  <button id="send">Send</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getDatabase, ref, push, onChildAdded, set, get, child } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-database.js";
import { getAuth, signInWithPopup, GoogleAuthProvider, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, setPersistence, browserLocalPersistence } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "YOUR API KEY",
  authDomain: "chatsnap-16189.firebaseapp.com",
  projectId: "chatsnap-16189",
  databaseURL: "https://chatsnap-16189-default-rtdb.europe-west1.firebasedatabase.app"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const auth = getAuth(app);
const messagesRef = ref(db, 'imperion_messages');

setPersistence(auth, browserLocalPersistence);

let nickname = "";
let profilePic = "";

// 🔥 AUTO LOGIN
onAuthStateChanged(auth, async (user) => {
  if (user) {
    const snap = await get(child(ref(db), 'users/' + user.uid));
    if (snap.exists()) {
      const data = snap.val();
      nickname = data.name;
      profilePic = data.profilePic;
    }

    document.getElementById("auth").style.display = "none";
    document.getElementById("chatUI").style.display = "block";
  }
});

// GOOGLE LOGIN
const provider = new GoogleAuthProvider();
googleLogin.onclick = () => signInWithPopup(auth, provider);

// EMAIL LOGIN
emailLogin.onclick = () => {
  const email = emailInput.value;
  const pass = passwordInput.value;

  signInWithEmailAndPassword(auth, email, pass)
  .catch(() => createUserWithEmailAndPassword(auth, email, pass));
};

// SAVE PROFILE (FIREBASE)
setProfile.onclick = () => {
  const user = auth.currentUser;
  if (!user) return alert("Login first");

  const name = nicknameInput.value;
  const file = profilePicInput.files[0];

  if(file){
    const reader = new FileReader();
    reader.onloadend = () => {
      profilePic = reader.result;

      set(ref(db, 'users/' + user.uid), {
        name,
        profilePic
      });

      nickname = name;
      alert("Profile saved!");
    };
    reader.readAsDataURL(file);
  }
};

// RECEIVE MESSAGES
onChildAdded(messagesRef, snap => {
  const msg = snap.val();
  const mine = msg.name === nickname;

  messages.innerHTML += `
    <div class="msg ${mine ? 'mine' : 'other'}">
      <img src="${msg.profilePic || ''}">
      <div>
        <strong>${msg.name}</strong><br>
        ${msg.text || ''}
        <div class="timestamp">${msg.time}</div>
      </div>
    </div>
  `;
});

// SEND MESSAGE
send.onclick = () => {
  const text = input.value.trim();
  if(!text) return;

  push(messagesRef, {
    name: nickname,
    text,
    time: new Date().toLocaleTimeString(),
    profilePic
  });

  input.value = "";
};
</script>

</body>
  </html>
