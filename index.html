<!DOCTYPE html>
<html>
<head>
  <title>Imperion</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#121212">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * { box-sizing: border-box; margin:0; padding:0; }
    html, body { height:100%; font-family:sans-serif; background:#121212; color:#e0e0e0; display:flex; flex-direction:column; }
    #header { display:flex; justify-content:space-between; align-items:center; padding:10px; background:#1f1f1f; }
    #header h2 { color:#4db8ff; }
    #settingsBtn { display:none; font-size:1.5em; background:none; border:none; color:#e0e0e0; cursor:pointer; }
    #auth { display:flex; flex-direction:column; padding:20px; gap:10px; align-items:center; justify-content:center; flex:1; }
    #auth button { width:80%; padding:10px; border-radius:5px; border:none; background:#3a3a3a; color:#e0e0e0; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:5px; }
    #messages { flex:1; overflow-y:auto; padding:10px; display:none; }
    .msg { display:flex; align-items:flex-start; margin:5px 0; max-width:75%; }
    .mine { background:#3a3a3a; margin-left:auto; flex-direction:row-reverse; border-radius:12px 12px 0 12px; }
    .other { background:#2c2c2c; margin-right:auto; border-radius:12px 12px 12px 0; }
    .msg img { border-radius:50%; width:36px; height:36px; margin:4px; }
    .msg-content { display:flex; flex-direction:column; padding:5px 8px; max-width:100%; }
    .msg-content .name { font-size:0.8em; color:#4db8ff; }
    .msg-content .text { white-space:pre-wrap; word-break:break-word; overflow-wrap:anywhere; }
    .timestamp { font-size:0.7em; color:#888; align-self:flex-end; }
    #inputContainer { display:none; padding:10px; background:#1f1f1f; gap:5px; }
    #inputContainer input { flex:1; padding:10px; border-radius:5px; border:none; background:#2c2c2c; color:#e0e0e0; }
    #inputContainer button { padding:10px; border-radius:5px; border:none; background:#3a3a3a; color:#e0e0e0; cursor:pointer; }
    #settingsPanel { position:fixed; top:0; right:-100%; width:80%; max-width:300px; height:100%; background:#1e1e1e; transition:0.3s; }
    #settingsPanel.active { right:0; }
    #settingsContent { padding:20px; display:flex; flex-direction:column; align-items:center; }
    #profilePreview { width:80px; height:80px; border-radius:50%; margin-bottom:10px; border:2px solid #4db8ff; }
  </style>
</head>
<body>

<div id="header">
  <h2>Imperion</h2>
  <button id="settingsBtn">⚙️</button>
</div>

<div id="auth">
  <button id="googleLogin">
    <img src="https://upload.wikimedia.org/wikipedia/commons/5/53/Google_%22G%22_Logo.svg" width="20">
    Sign in with Google
  </button>
  <input type="email" id="emailInput" placeholder="Email">
  <input type="password" id="passwordInput" placeholder="Password">
  <button id="emailLogin">Sign in with Email</button>
  <button id="signup">Create Account</button>
</div>

<div id="messages"></div>

<div id="inputContainer">
  <input type="text" id="input" placeholder="Type a message">
  <button id="send">Send</button>
  <button id="voice">🎤</button>
</div>

<div id="settingsPanel">
  <div id="settingsContent">
    <h3>Profile</h3>
    <img id="profilePreview">
    <input id="editNickname" placeholder="Nickname">
    <input type="file" id="editProfilePic">
    <button id="saveSettings">Save</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getDatabase, ref, push } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-database.js";
import { 
  getAuth, 
  signInWithRedirect,
  getRedirectResult,
  GoogleAuthProvider, 
  createUserWithEmailAndPassword, 
  signInWithEmailAndPassword, 
  onAuthStateChanged, 
  browserLocalPersistence, 
  setPersistence 
} from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "chatsnap-16189.firebaseapp.com",
  projectId: "chatsnap-16189",
  storageBucket: "chatsnap-16189.firebasestorage.app",
  messagingSenderId: "687581415852",
  appId: "1:687581415852:web:3fe355b6fc830ae340d209",
  databaseURL: "https://chatsnap-16189-default-rtdb.europe-west1.firebasedatabase.app"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const auth = getAuth(app);

const emailInput = document.getElementById("emailInput");
const passwordInput = document.getElementById("passwordInput");
const authDiv = document.getElementById("auth");

let loggingIn = false;

function showLoading(text="Loading..."){
  authDiv.innerHTML = `<p style="text-align:center">${text}</p>`;
}

function showChatUI(){
  authDiv.style.display="none";
}

// Persistence
setPersistence(auth, browserLocalPersistence);

// Google login (FIXED)
const provider = new GoogleAuthProvider();

document.getElementById("googleLogin").onclick = ()=>{
  showLoading("Redirecting to Google...");
  signInWithRedirect(auth, provider);
};

// Handle redirect result
getRedirectResult(auth)
.then(result=>{
  if(result && result.user){
    showChatUI();
  }
})
.catch(err=>{
  alert(err.message);
});

// Email login
document.getElementById("emailLogin").onclick = ()=>{
  if(loggingIn) return;
  loggingIn = true;

  const email = emailInput.value;
  const pass = passwordInput.value;

  if(!email || !pass){
    loggingIn = false;
    return alert("Enter email & password");
  }

  showLoading("Signing you in...");

  signInWithEmailAndPassword(auth,email,pass)
  .then(()=>{
    loggingIn = false;
    showChatUI();
  })
  .catch(err=>{
    loggingIn = false;
    alert(err.message);
    location.reload();
  });
};

// Signup
document.getElementById("signup").onclick = ()=>{
  const email = emailInput.value;
  const pass = passwordInput.value;

  if(!email || !pass) return alert("Enter email & password");

  showLoading("Creating account...");

  createUserWithEmailAndPassword(auth,email,pass)
  .then(()=>showChatUI())
  .catch(err=>{
    alert(err.message);
    location.reload();
  });
};

// Auth state
onAuthStateChanged(auth,user=>{
  if(user){
    showChatUI();
  }
});
</script>

</body>
      </html>
