<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Imperion Chat</title>

<style>
body {
    margin:0;
    font-family:sans-serif;
    background:#0A1929;
    color:white;
}

#app {
    max-width:500px;
    margin:auto;
    height:100vh;
    display:flex;
    flex-direction:column;
}

input, button {
    padding:10px;
    border-radius:8px;
    border:none;
}

button {
    background:#D4AF37;
    color:#0A1929;
    cursor:pointer;
}

#login-screen, #main-app {
    padding:20px;
}

.contact {
    background:#132B3F;
    padding:10px;
    margin:5px 0;
    border-radius:10px;
    cursor:pointer;
}

.message {
    padding:10px;
    margin:5px;
    border-radius:10px;
}

.sent {
    background:#D4AF37;
    color:#000;
    text-align:right;
}

.received {
    background:#132B3F;
}
</style>
</head>

<body>

<div id="app">

<!-- LOGIN -->
<div id="login-screen">
    <h2>Imperion</h2>
    <input id="username" placeholder="Enter username">
    <button id="loginBtn">Login</button>
</div>

<!-- MAIN -->
<div id="main-app" style="display:none;">
    <h3 id="userDisplay"></h3>

    <div id="contacts"></div>

    <div id="chatBox" style="display:none;">
        <h4 id="chatName"></h4>
        <div id="messages"></div>

        <input id="msgInput" placeholder="Type message">
        <button id="sendBtn">Send</button>
    </div>
</div>

</div>

<!-- ✅ Firebase CDN -->
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

<script>

// 🔥 Firebase config
const firebaseConfig = {
    apiKey: "AIzaSyDwM8N-eMlsbndlnuOnB9dQ5lx9D2Dn1hI",
    authDomain: "chatsnap-16189.firebaseapp.com",
    projectId: "chatsnap-16189",
    storageBucket: "chatsnap-16189.firebasestorage.app",
    messagingSenderId: "687581415852",
    appId: "1:687581415852:web:3fe355b6fc830ae340d209"
};

// INIT
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let currentUser = null;
let currentChat = null;

// DOM
const loginBtn = document.getElementById("loginBtn");
const usernameInput = document.getElementById("username");
const loginScreen = document.getElementById("login-screen");
const mainApp = document.getElementById("main-app");
const contactsDiv = document.getElementById("contacts");
const userDisplay = document.getElementById("userDisplay");

const chatBox = document.getElementById("chatBox");
const chatName = document.getElementById("chatName");
const messagesDiv = document.getElementById("messages");
const msgInput = document.getElementById("msgInput");
const sendBtn = document.getElementById("sendBtn");

// LOGIN
loginBtn.onclick = async () => {
    const name = usernameInput.value.trim();
    if (!name) return alert("Enter name");

    const userId = "user_" + Date.now();

    await db.collection("users").doc(userId).set({
        name
    });

    currentUser = { id:userId, name };

    loginScreen.style.display = "none";
    mainApp.style.display = "block";

    userDisplay.innerText = "Logged in as: " + name;

    loadUsers();
};

// LOAD USERS
async function loadUsers(){
    const snap = await db.collection("users").get();

    contactsDiv.innerHTML = "";

    snap.forEach(doc=>{
        if(doc.id !== currentUser.id){
            const user = doc.data();

            const div = document.createElement("div");
            div.className = "contact";
            div.innerText = user.name;

            div.onclick = ()=>{
                openChat(doc.id, user.name);
            };

            contactsDiv.appendChild(div);
        }
    });
}

// OPEN CHAT
function openChat(id, name){
    currentChat = id;

    chatBox.style.display = "block";
    chatName.innerText = name;

    listenMessages();
}

// LISTEN MESSAGES
function listenMessages(){
    const chatId = [currentUser.id, currentChat].sort().join("_");

    db.collection("chats")
    .doc(chatId)
    .collection("messages")
    .orderBy("time")
    .onSnapshot(snap=>{
        messagesDiv.innerHTML = "";

        snap.forEach(doc=>{
            const msg = doc.data();

            const div = document.createElement("div");
            div.className = "message " + (msg.sender === currentUser.id ? "sent":"received");
            div.innerText = msg.text;

            messagesDiv.appendChild(div);
        });
    });
}

// SEND
sendBtn.onclick = async ()=>{
    const text = msgInput.value.trim();
    if(!text) return;

    const chatId = [currentUser.id, currentChat].sort().join("_");

    await db.collection("chats")
    .doc(chatId)
    .collection("messages")
    .add({
        text,
        sender: currentUser.id,
        time: new Date()
    });

    msgInput.value = "";
};

</script>

</body>
</html>
