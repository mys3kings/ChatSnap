<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Imperion · messaging app</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
        }
        
        body {
            background: #0a1419;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        #app {
            width: 100%;
            max-width: 500px;
            height: 100vh;
            max-height: 900px;
            background: #0e1a21;
            border-radius: 0;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }
        
        @media (min-width: 768px) {
            #app {
                border-radius: 30px;
                height: 90vh;
                margin: 20px;
            }
        }
        
        /* Login Screen */
        #login-screen {
            padding: 2rem;
            display: flex;
            flex-direction: column;
            height: 100%;
            justify-content: center;
            background: #0e1a21;
        }
        
        #login-screen h1 {
            color: #25D366;
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
        }
        
        #login-screen h2 {
            color: #8ba0b2;
            font-size: 1rem;
            margin-bottom: 2rem;
            font-weight: 400;
        }
        
        #login-screen input {
            width: 100%;
            padding: 1rem;
            margin-bottom: 1rem;
            background: #1f2f39;
            border: 1px solid #314954;
            border-radius: 12px;
            color: white;
            font-size: 1rem;
        }
        
        #login-screen button {
            width: 100%;
            padding: 1rem;
            background: #25D366;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            font-size: 1rem;
            color: #0a1419;
            cursor: pointer;
            margin-bottom: 0.5rem;
        }
        
        #login-error {
            color: #ff6b6b;
            text-align: center;
            margin-top: 1rem;
        }
        
        /* Main App */
        #main-app {
            display: none;
            flex-direction: column;
            height: 100%;
            background: #0e1a21;
        }
        
        /* Header */
        .header {
            background: #0f1a1f;
            padding: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #25D366;
        }
        
        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            color: white;
        }
        
        .logo span {
            color: #25D366;
        }
        
        #user-info {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            background: #1f2f39;
            padding: 0.4rem 1rem;
            border-radius: 30px;
            font-size: 0.85rem;
            color: #b4d5e5;
        }
        
        #logout-btn {
            background: #2a3f4b;
            border: none;
            color: white;
            padding: 0.4rem 1rem;
            border-radius: 30px;
            cursor: pointer;
        }
        
        /* Tabs */
        .tabs {
            display: flex;
            background: #101d25;
            border-bottom: 1px solid #1f323e;
        }
        
        .tab {
            flex: 1;
            text-align: center;
            padding: 1rem;
            cursor: pointer;
            color: #8ba0b2;
            font-weight: 500;
        }
        
        .tab.active {
            color: #25D366;
            border-bottom: 3px solid #25D366;
        }
        
        /* Content */
        #content-area {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
            background: #0a1419;
        }
        
        /* Contacts List */
        .contact-item {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 1rem;
            background: #13222b;
            border-radius: 16px;
            margin-bottom: 0.5rem;
            cursor: pointer;
        }
            .contact-avatar {
            width: 50px;
            height: 50px;
            background: #25D366;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            color: #0f1a1f;
        }
        
        .contact-details {
            flex: 1;
        }
        
        .contact-name {
            font-weight: 600;
            color: white;
            margin-bottom: 0.2rem;
        }
        
        .contact-last {
            font-size: 0.8rem;
            color: #9ab3c4;
        }
        
        /* Chat View */
        #chat-view {
            display: none;
            flex-direction: column;
            height: 100%;
        }
        
        .chat-header {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 1rem;
            background: #101d25;
        }
        
        #back-btn {
            background: none;
            border: none;
            color: #25D366;
            font-size: 1.5rem;
            cursor: pointer;
        }
        
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }
        
        .message {
            max-width: 80%;
            padding: 0.8rem 1rem;
            border-radius: 20px;
            word-wrap: break-word;
        }
        
        .message.sent {
            background: #25D366;
            color: #0a1419;
            align-self: flex-end;
        }
        
        .message.received {
            background: #1f2f39;
            color: white;
            align-self: flex-start;
        }
        
        .message-input-area {
            display: flex;
            gap: 0.5rem;
            padding: 1rem;
            background: #101d25;
        }
        
        #message-input {
            flex: 1;
            padding: 0.8rem;
            background: #1f2f39;
            border: none;
            border-radius: 25px;
            color: white;
        }
        
        #send-btn {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: #25D366;
            border: none;
            cursor: pointer;
            font-size: 1.2rem;
        }
        
        /* Add Contact */
        .add-contact {
            padding: 1rem;
            background: #13222b;
            border-radius: 16px;
            margin-bottom: 1rem;
        }
        
        .add-contact input {
            width: 100%;
            padding: 0.8rem;
            background: #1f2f39;
            border: 1px solid #314954;
            border-radius: 12px;
            color: white;
            margin-bottom: 0.5rem;
        }
        
        .add-contact button {
            width: 100%;
            padding: 0.8rem;
            background: #25D366;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
        }
        
        .empty-state {
            text-align: center;
            color: #4a6577;
            padding: 2rem;
        }
    </style>
</head>
<body>
    <div id="app">
        <!-- Login Screen -->
        <div id="login-screen">
            <h1>IMPERION</h1>
            <h2>secure messaging</h2>
            <input type="text" id="username-input" placeholder="Your name (e.g., Alice)" value="Alice">
            <button id="login-btn">Start chatting</button>
            <div id="login-error"></div>
            <p style="color:#4a6577; text-align:center; margin-top:2rem; font-size:0.8rem;">
                Demo: Enter any name to begin
            </p>
        </div>
        
        <!-- Main App -->
        <div id="main-app">
            <div class="header">
                <div class="logo">IMPERION<span>.</span></div>
                <div style="display: flex; gap: 0.5rem;">
                    <span id="user-info"></span>
                    <button id="logout-btn">Exit</button>
                </div>
            </div> <div class="tabs">
                <div class="tab active" data-tab="chats">Chats</div>
                <div class="tab" data-tab="contacts">Contacts</div>
                <div class="tab" data-tab="profile">Profile</div>
            </div>
            
            <div id="content-area">
                <!-- Chats Tab -->
                <div id="chats-tab">
                    <div id="contacts-list"></div>
                </div>
                
                <!-- Contacts Tab (hidden by default) -->
                <div id="contacts-tab" style="display: none;">
                    <div class="add-contact">
                        <input type="text" id="new-contact-name" placeholder="Contact name" value="Bob">
                        <input type="text" id="new-contact-phone" placeholder="Phone or ID" value="bob@example.com">
                        <button id="add-contact-btn">Add Contact</button>
                    </div>
                    <div id="all-contacts-list"></div>
                </div>
                
                <!-- Profile Tab (hidden by default) -->
                <div id="profile-tab" style="display: none;">
                    <div style="background:#13222b; border-radius:16px; padding:2rem; text-align:center;">
                        <div style="width:80px; height:80px; background:#25D366; border-radius:50%; margin:0 auto 1rem; display:flex; align-items:center; justify-content:center; font-size:2rem; font-weight:700;">
                            👤
                        </div>
                        <h3 style="color:white;" id="profile-name"></h3>
                        <p style="color:#4a6577; margin-top:1rem;">End-to-end encrypted</p>
                    </div>
                </div>
            </div>
            
            <!-- Chat View (hidden by default) -->
            <div id="chat-view">
                <div class="chat-header">
                    <button id="back-btn">←</button>
                    <div>
                        <div style="font-weight:600; color:white;" id="chat-contact-name"></div>
                        <div style="font-size:0.8rem; color:#4a6577;">encrypted</div>
                    </div>
                </div>
                
                <div class="messages" id="messages-container"></div>
                
                <div class="message-input-area">
                    <input type="text" id="message-input" placeholder="Type a message...">
                    <button id="send-btn">➤</button>
                </div>
            </div>
        </div>
    </div>
    
    <script type="module">
        // Simple in-memory database (no Firebase required)
        // This version works immediately without any setup!
        
        // Data stores
        const users = JSON.parse(localStorage.getItem('imperion_users')) || {};
        const messages = JSON.parse(localStorage.getItem('imperion_messages')) || {};
        const contacts = JSON.parse(localStorage.getItem('imperion_contacts')) || {};
        
        // Current user
        let currentUser = null;
        let currentChatContact = null;
        
        // DOM elements
        const loginScreen = document.getElementById('login-screen');
        const mainApp = document.getElementById('main-app');
        const loginBtn = document.getElementById('login-btn');
        const usernameInput = document.getElementById('username-input');
        const loginError = document.getElementById('login-error');
        const userInfo = document.getElementById('user-info');
        const logoutBtn = document.getElementById('logout-btn');
        const contentArea = document.getElementById('content-area');
        const chatView = document.getElementById('chat-view');
        const backBtn = document.getElementById('back-btn');
        const messagesContainer = document.getElementById('messages-container');
        const messageInput = document.getElementById('message-input');
        const sendBtn = document.getElementById('send-btn');
        const chatContactName = document.getElementById('chat-contact-name');
        const tabs = document.querySelectorAll('.tab');
        const chatsTab = document.getElementById('chats-tab');
        const contactsTab = document.getElementById('contacts-tab');
        const profileTab = document.getElementById('profile-tab');
        const profileName = document.getElementById('profile-name');
        const contactsList = document.getElementById('contacts-list');
        const allContactsList = document.getElementById('all-contacts-list');
        const addContactBtn = document.getElementById('add-contact-btn');
        const newContactName = document.getElementById('new-contact-name');
        const newContactPhone = document.getElementById('new-contact-phone');
        
        // Login
        loginBtn.addEventListener('click', () => {
            const name = usernameInput.value.trim();
            if (!name) {
                loginError.textContent = 'Please enter a name';
                return;
            }
            
            // Create user
            const userId = 'user_' + Date.now();
            currentUser = {
                id: userId,
                name: name,
                phone: name.toLowerCase() + '@example.com'
            };
            
            // Save user
            users[userId] = currentUser;
            localStorage.setItem('imperion_users', JSON.stringify(users));
            
            // Initialize contacts for this user
            if (!contacts[userId]) {
                contacts[userId] = [];
            }
            localStorage.setItem('imperion_contacts', JSON.stringify(contacts));
            
            // Initialize messages for this user
            if (!messages[userId]) {
                messages[userId] = {};
            }
            localStorage.setItem('imperion_messages', JSON.stringify(messages));
            
            // Show main app
            loginScreen.style.display = 'none';
            mainApp.style.display = 'flex';
            userInfo.textContent = name;
            profileName.textContent = name;
            
            // Add default contacts
            if (contacts[userId].length === 0) {
                contacts[userId].push({
                    id: 'user_bob',
                    name: 'Bob',
                    phone: 'bob@example.com'
                });
                contacts[userId].push({
                    id: 'user_charlie',
                    name: 'Charlie',
                    phone: 'charlie@example.com'
                });
                localStorage.setItem('imperion_contacts', JSON.stringify(contacts));
            }
            
            // Add some demo messages
            if (!messages[userId]['user_bob']) {
                messages[userId]['user_bob'] = [
                    {
                        text: 'Hey there! 👋',
                        sender: 'user_bob',
                        receiver: userId,
                        time: new Date(Date.now() - 3600000).toISOString()
                    },
                    {
                        text: 'Hi Bob!',
                        sender: userId,
                        receiver: 'user_bob',
                        time: new Date(Date.now() - 3500000).toISOString()
                    }
                ];
                localStorage.setItem('imperion_messages', JSON.stringify(messages));
            }
            
            if (!messages[userId]['user_charlie']) {
                messages[userId]['user_charlie'] = [
                    {
                        text: 'Welcome to Imperion!',
                        sender: 'user_charlie',
                        receiver: userId,
                        time: new Date(Date.now() - 7200000).toISOString()
                    }
                ];
                localStorage.setItem('imperion_messages', JSON.stringify(messages));
            }
            
            renderContacts();
            renderAllContacts();
        });
        
        // Logout
        logoutBtn.addEventListener('click', () => {
            currentUser = null;
            currentChatContact = null;
            loginScreen.style.display = 'flex';
            mainApp.style.display = 'none';
            chatView.style.display = 'none';
            contentArea.style.display = 'block';
        });
        
        // Tab switching
        tabs.forEach(tab => {
            tab.addEventListener('click', () => {
                tabs.forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                
                const tabName = tab.dataset.tab;
                chatsTab.style.display = tabName === 'chats' ? 'block' : 'none';
                contactsTab.style.display = tabName === 'contacts' ? 'block' : 'none';
                profileTab.style.display = tabName === 'profile' ? 'block' : 'none';
                
                if (tabName === 'contacts') {
                    renderAllContacts();
                } else if (tabName === 'chats') {
                    renderContacts();
                }
            });
        });
        
        // Render contacts (chats list)
        function renderContacts() {
            if (!currentUser) return;
            
            const userContacts = contacts[currentUser.id] || [];
            
            if (userContacts.length === 0) {
                contactsList.innerHTML = '<div class="empty-state">No contacts yet. Add some in Contacts tab.</div>';
                return;
            }
            
            let html = '';
            userContacts.forEach(contact => {
                const lastMsg = getLastMessage(contact.id);
                html += `
                    <div class="contact-item" data-contact-id="${contact.id}">
                        <div class="contact-avatar">${contact.name.charAt(0)}</div>
                        <div class="contact-details">
                            <div class="contact-name">${contact.name}</div>
                            <div class="contact-last">${lastMsg || 'No messages'}</div>
                        </div>
                    </div>
                `;
            });
            
            contactsList.innerHTML = html;
            
            // Add click handlers
            document.querySelectorAll('.contact-item').forEach(item => {
                item.addEventListener('click', () => {
                    const contactId = item.dataset.contactId;
                    const contact = userContacts.find(c => c.id === contactId);
                    openChat(contact);
                });
            });
        }
        
        // Render all contacts (for contacts tab)
        function renderAllContacts() {
            if (!currentUser) return;
            
            const userContacts = contacts[currentUser.id] || [];if (userContacts.length === 0) {
                allContactsList.innerHTML = '<div class="empty-state">No contacts yet. Add one above.</div>';
                return;
            }
            
            let html = '';
            userContacts.forEach(contact => {
                html += `
                    <div class="contact-item" data-contact-id="${contact.id}">
                        <div class="contact-avatar">${contact.name.charAt(0)}</div>
                        <div class="contact-details">
                            <div class="contact-name">${contact.name}</div>
                            <div class="contact-last">${contact.phone}</div>
                        </div>
                    </div>
                `;
            });
            
            allContactsList.innerHTML = html;
        }
        
        // Get last message
        function getLastMessage(contactId) {
            if (!currentUser) return '';
            
            const chatMessages = messages[currentUser.id]?.[contactId] || [];
            if (chatMessages.length === 0) return '';
            
            const last = chatMessages[chatMessages.length - 1];
            return last.text.substring(0, 30) + (last.text.length > 30 ? '...' : '');
        }
        
        // Add contact
        addContactBtn.addEventListener('click', () => {
            if (!currentUser) return;
            
            const name = newContactName.value.trim();
            const phone = newContactPhone.value.trim();
            
            if (!name || !phone) {
                alert('Please enter name and phone');
                return;
            }
            
            const newContact = {
                id: 'user_' + Date.now(),
                name: name,
                phone: phone
            };
            
            contacts[currentUser.id].push(newContact);
            localStorage.setItem('imperion_contacts', JSON.stringify(contacts));
            
            newContactName.value = '';
            newContactPhone.value = '';
            
            renderAllContacts();
            renderContacts();
        });
        
        // Open chat
        function openChat(contact) {
            currentChatContact = contact;
            chatContactName.textContent = contact.name;
            
            contentArea.style.display = 'none';
            chatView.style.display = 'flex';
            
            renderMessages();
        }
        
        // Back button
        backBtn.addEventListener('click', () => {
            chatView.style.display = 'none';
            contentArea.style.display = 'block';
            currentChatContact = null;
        });
        
        // Render messages
        function renderMessages() {
            if (!currentUser || !currentChatContact) return;
            
            const chatMessages = messages[currentUser.id]?.[currentChatContact.id] || [];
            
            if (chatMessages.length === 0) {
                messagesContainer.innerHTML = '<div class="empty-state">No messages yet. Say hi! 👋</div>';
                return;
            }
            
            let html = '';
            chatMessages.forEach(msg => {
                const isSent = msg.sender === currentUser.id;
                const time = new Date(msg.time).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                
                html += `
                    <div class="message ${isSent ? 'sent' : 'received'}">
                        ${msg.text}
                        <div style="font-size:0.7rem; opacity:0.7; margin-top:0.2rem;">${time}</div>
                    </div>
                `;
            });
            
            messagesContainer.innerHTML = html;
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }
        
        // Send message
        sendBtn.addEventListener('click', sendMessage);
        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });
        
        function sendMessage() {
            const text = messageInput.value.trim();
            if (!text || !currentUser || !currentChatContact) return;
            
            const message = {
                text: text,
                sender: currentUser.id,
                receiver: currentChatContact.id,
                time: new Date().toISOString()
            };
            
            // Save to current user's messages
            if (!messages[currentUser.id][currentChatContact.id]) {
                messages[currentUser.id][currentChatContact.id] = [];
            }
            messages[currentUser.id][currentChatContact.id].push(message);
            
            // Also save to contact's messages (simulate receiving)
            if (!messages[currentChatContact.id]) {
                messages[currentChatContact.id] = {};
            }
            if (!messages[currentChatContact.id][currentUser.id]) {
                messages[currentChatContact.id][currentUser.id] = [];
            }
            messages[currentChatContact.id][currentUser.id].push({
                ...message,
                sender: currentUser.id,
                receiver: currentChatContact.id
            });
            
            localStorage.setItem('imperion_messages', JSON.stringify(messages));
            
            messageInput.value = '';
            renderMessages();
            renderContacts(); // Update last message preview
        }
        
        // Check for existing session
        const savedUsers = Object.values(users);
        if (savedUsers.length > 0 && !currentUser) {
            // Just show login screen, user can login manually
        }
    </script>
</body>
</html>
