<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Imperion</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#121212">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Imperion">

  <style>
    * { box-sizing: border-box; margin:0; padding:0; }
    body, html { width:100%; height:100%; font-family:sans-serif; background:#121212; color:#e0e0e0; }
    #header { display:flex; justify-content:space-between; align-items:center; padding:10px; background:#1f1f1f; }
    #header h2 { color:#4db8ff; }
    #header button { background:none; border:none; color:#e0e0e0; font-size:1.5em; cursor:pointer; }
    #auth { display:flex; flex-direction:column; padding:20px; gap:10px; align-items:center; justify-content:center; height:calc(100% - 60px); }
    #auth input, #auth button { width:80%; padding:10px; border-radius:5px; border:none; }
    #auth button { background:#3a3a3a; color:#e0e0e0; cursor:pointer; }
    #messages { flex:1; overflow-y:auto; padding:10px; display:none; }
    .msg { display:flex; align-items:flex-start; margin:5px 0; max-width:75%; word-wrap:break-word; }
    .mine { background:#3a3a3a; margin-left:auto; flex-direction:row-reverse; border-radius:12px 12px 0 12px; }
    .other { background:#2c2c2c; margin-right:auto; border-radius:12px 12px 12px 0; }
    .msg img { border-radius:50%; width:36px; height:36px; margin:4px; }
    .msg-content { display:flex; flex-direction:column; }
    .msg-content .name { font-size:0.8em; color:#4db8ff; margin-bottom:2px; }
    .msg-content .text { font-size:1em; }
    .timestamp { font-size:0.7em; color:#888; align-self:flex-end; margin-top:2px; }
    #inputContainer { display:none; padding:10px; background:#1f1f1f; gap:5px; }
    #inputContainer input { flex:1; padding:10px; border-radius:5px; border:none; background:#2c2c2c; color:#e0e0e0; }
    #inputContainer button { padding:10px; border-radius:5px; border:none; background:#3a3a3a; color:#e0e0e0; cursor:pointer; }
  </style>
</head>
<body>

<div id="header">
  <h2>Imperion</h2>
  <button id="settingsBtn" style="display:none;">⚙️</button>
</div>

<div id="auth">
  <button id="googleLogin">Sign in with Google</button>
  <input type="email" id="emailInput" placeholder="Email">
  <input type="password" id="passwordInput" placeholder="Password">
  <button id="emailLogin">Login / Signup</button>
  <input type="text" id="nicknameInput" placeholder="Choose your nickname">
  <input type="file" id="profilePicInput" accept="image/*">
  <button id="setProfile">Set Profile</button>
</div>

<div id="messages"></div>

<div id="inputContainer">
  <input type="text" id="input" placeholder="Type a message">
  <button id="send">Send</button>
  <button id="voice">🎤</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getAnalytics } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-analytics.js";
import { getDatabase, ref, push, onChildAdded } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-database.js";
import { getAuth, signInWithPopup, GoogleAuthProvider, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, browserLocalPersistence, setPersistence } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyDwM8N-eMlsbndlnuOnB9dQ5lx9D2Dn1hI",
  authDomain: "chatsnap-16189.firebaseapp.com",
  projectId: "chatsnap-16189",
  storageBucket: "chatsnap-16189.firebasestorage.app",
  messagingSenderId: "687581415852",
  appId: "1:687581415852:web:3fe355b6fc830ae340d209",
  databaseURL: "https://chatsnap-16189-default-rtdb.europe-west1.firebasedatabase.app"
};

const app = initializeApp(firebaseConfig);
const analytics = getAnalytics(app);
const db = getDatabase(app);
const auth = getAuth(app);
const messagesRef = ref(db, 'imperion_messages');

const emailInput = document.getElementById("emailInput");
const passwordInput = document.getElementById("passwordInput");
const messagesDiv = document.getElementById('messages');
const input = document.getElementById('input');
const send = document.getElementById('send');
const voiceBtn = document.getElementById('voice');
const authDiv = document.getElementById("auth");
const inputContainer = document.getElementById("inputContainer");
const settingsBtn = document.getElementById("settingsBtn");
const nicknameInput = document.getElementById("nicknameInput");
const profilePicInput = document.getElementById("profilePicInput");
const setProfileBtn = document.getElementById("setProfile");

let nickname = localStorage.getItem('nickname') || "";
let profilePic = localStorage.getItem('profilePic') || "";

if(nickname) nicknameInput.value = nickname;

setProfileBtn.onclick = () => {
  const chosen = nicknameInput.value.trim();
  if(!chosen) return alert("Nickname cannot be empty!");
  nickname = chosen;
  localStorage.setItem('nickname', nickname);

  const file = profilePicInput.files[0];
  if(file){
    const reader = new FileReader();
    reader.onloadend = () => {
      profilePic = reader.result;
      localStorage.setItem('profilePic', profilePic);
      alert("Profile saved!");
    };
    reader.readAsDataURL(file);
  } else {
    alert("Nickname saved!");
  }
};

setPersistence(auth, browserLocalPersistence);

function showChatUI(userNickname, userProfilePic){
  nickname = userNickname || nickname || "Anonymous";
  profilePic = userProfilePic || profilePic || "";
  localStorage.setItem('nickname', nickname);
  localStorage.setItem('profilePic', profilePic);

  authDiv.style.display = "none";
  messagesDiv.style.display = "block";
  inputContainer.style.display = "flex";
  settingsBtn.style.display = "block";
}

const provider = new GoogleAuthProvider();

document.getElementById("googleLogin").onclick = () => {
  signInWithPopup(auth, provider)
    .then(result => showChatUI(result.user.displayName, result.user.photoURL))
    .catch(console.error);
};

document.getElementById("emailLogin").onclick = () => {
  const email = emailInput.value;
  const pass = passwordInput.value;

  if(!email || !pass) return alert("Enter email & password");

  signInWithEmailAndPassword(auth, email, pass)
    .then(userCred => showChatUI(userCred.user.displayName, userCred.user.photoURL))
    .catch(() => {
      createUserWithEmailAndPassword(auth, email, pass)
        .then(userCred => showChatUI(userCred.user.displayName, userCred.user.photoURL))
        .catch(console.error);
    });
};

onAuthStateChanged(auth, user => {
  if(user){
    showChatUI(user.displayName, user.photoURL);
  } else {
    authDiv.style.display = "flex";
    messagesDiv.style.display = "none";
    inputContainer.style.display = "none";
    settingsBtn.style.display = "none";
  }
});

// Listen for messages
onChildAdded(messagesRef, snapshot => {
  const msg = snapshot.val();
  const isMine = msg.name === nickname;
  const avatar = msg.profilePic || "default-avatar.png";

  messagesDiv.innerHTML += `
    <div class="msg ${isMine ? 'mine' : 'other'}">
      <img src="${avatar}">
      <div class="msg-content">
        <div class="name">${msg.name}</div>
        ${msg.text ? `<div class="text">${msg.text}</div>` : `<audio controls src="${msg.audio}"></audio>`}
        <div class="timestamp">${msg.time}</div>
      </div>
    </div>`;
  messagesDiv.scrollTop = messagesDiv.scrollHeight;
});

// Send message
send.onclick = () => {
  const text = input.value.trim();
  if(!text) return;

  push(messagesRef, { name: nickname, text, time: new Date().toLocaleTimeString(), profilePic });
  input.value = "";
};

// Enter key
input.addEventListener('keypress', e => { if(e.key==='Enter') send.onclick(); });

// Voice notes
let mediaRecorder, audioChunks = [];

voiceBtn.onclick = async () => {
  if(!mediaRecorder || mediaRecorder.state==='inactive'){
    const stream = await navigator.mediaDevices.getUserMedia({ audio:true });
    mediaRecorder = new MediaRecorder(stream);
    audioChunks = [];
    mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
    mediaRecorder.onstop = () => {
      const audioBlob = new Blob(audioChunks);
      const reader = new FileReader();
      reader.onloadend = () => push(messagesRef, { name:nickname, audio:reader.result, time:new Date().toLocaleTimeString(), profilePic });
      reader.readAsDataURL(audioBlob);
    };
    mediaRecorder.start();
    voiceBtn.textContent="⏹️";
  } else {
    mediaRecorder.stop();
    voiceBtn.textContent="🎤";
  }
};
</script>

</body>
  </html>
